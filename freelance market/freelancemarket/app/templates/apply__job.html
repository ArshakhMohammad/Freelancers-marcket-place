<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply for Job | SkillLink</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
}

.apply-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:35px;
    text-align:center;
}

.header h1{
    font-size:32px;
    margin-bottom:10px;
}

.header p{
    opacity:0.9;
}

.content{
    padding:35px;
}

.job-title{
    font-size:28px;
    color:#111827;
    margin-bottom:10px;
}

.subtitle{
    color:#6b7280;
    margin-bottom:30px;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:10px;
    color:#374151;
}

textarea{
    width:100%;
    min-height:220px;
    padding:18px;
    border:2px solid #e5e7eb;
    border-radius:12px;
    resize:vertical;
    font-size:15px;
    outline:none;
    transition:.3s;
}

textarea:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

.tips{
    background:#eff6ff;
    border-left:5px solid #2563eb;
    padding:15px;
    border-radius:10px;
    margin:20px 0;
    color:#1e40af;
}

.btn-group{
    display:flex;
    gap:15px;
    margin-top:25px;
}

.submit-btn{
    flex:1;
    border:none;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
}

.back-btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    background:#f3f4f6;
    color:#374151;
    padding:15px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#e5e7eb;
}

@media(max-width:768px){

    .btn-group{
        flex-direction:column;
    }

    .header h1{
        font-size:26px;
    }

    .job-title{
        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="apply-card">

        <div class="header">

            <h1>
                <i class="fa-solid fa-paper-plane"></i>
                Apply for Job
            </h1>

            <p>Send a professional proposal to the client</p>

        </div>

        <div class="content">

            <h2 class="job-title">
                {{ job.title }}
            </h2>

            <p class="subtitle">
                Tell the client why you're the best fit for this project.
            </p>

            <form method="POST">

                {% csrf_token %}

                <label>
                    <i class="fa-solid fa-file-signature"></i>
                    Your Proposal
                </label>

                <textarea
                    name="cover_letter"
                    placeholder="Example:

Hello,

I am an experienced Django developer with expertise in Python, HTML, CSS, JavaScript, and database design. I have successfully completed similar projects and can deliver high-quality work within the required timeline.

Looking forward to discussing your project.

Best regards,
{{ freelancer.full_name }}"
                    required
                ></textarea>

                <div class="tips">
                    <strong>Tip:</strong> Mention your experience, relevant skills,
                    estimated timeline, and why you're suitable for the job.
                </div>

                <div class="btn-group">

                    <a href="{% url 'job_list' %}" class="back-btn">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back
                    </a>

                    <button type="submit" class="submit-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                        Submit Application
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
